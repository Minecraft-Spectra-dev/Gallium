plugins {
    id 'base'
    id 'maven-publish'
    id 'net.fabricmc.fabric-loom' version "${loom_version}" apply false
    id 'net.fabricmc.fabric-loom-remap' version "${loom_version}" apply false
    id 'com.replaymod.preprocess' version 'c5abb4fb12'
}

preprocess {
    strictExtraMappings = false

    def mc12111 = createNode('1.21.11', 1_21_11, 'mojang')
    // Mojang dropped the "1." prefix at MC 26; we keep encoding the implicit
    // leading 1 to preserve the 5-digit width of older versions, so integer
    // comparisons (>= 1_21_00 etc.) stay monotonic.
    def mc2601 = createNode('26.1', 1_26_01, 'mojang')

    // mainProject is 26.1; preprocessor maps from there to 1.21.11.
    mc2601.link(mc12111, null)

    for (final def node in getNodes()) {
        findProject(node.project).ext.mcVersion = node.mcVersion
    }
}

tasks.register('buildAndGather') {
    group = 'build'
    description = 'Builds all versions and gathers them into root build/libs'

    subprojects {
        dependsOn project.tasks.named('build').get()
    }

    doLast {
        def rootBuildLibs = rootProject.layout.buildDirectory.dir('libs').get().asFile
        rootBuildLibs.mkdirs()

        subprojects {
            def subprojectLibs = project.layout.buildDirectory.dir('libs').get().asFile

            def minecraftDep = project.findProperty("minecraft_dependency")?.toString() ?: project.name
            def versionSuffix = convertDependencyToSuffix(minecraftDep)

            copy {
                from(subprojectLibs) {
                    include '*.jar'
                    exclude '*-dev.jar', '*-sources.jar', '*-shadow.jar'
                }
                into rootBuildLibs

                rename { filename ->
                    def baseName = filename.replaceAll(/\.jar$/, '')
                    if (!baseName.contains("-mc")) {
                        return "${baseName}-mc${versionSuffix}.jar"
                    }
                    return filename
                }

                duplicatesStrategy = DuplicatesStrategy.INCLUDE
            }
        }
    }
}

static def convertDependencyToSuffix(String dependency) {
    def dep = dependency.replaceAll(/\s+/, '')

    def exactPattern = ~/^([0-9.]+)$/
    def exactMatcher = exactPattern.matcher(dep)
    if (exactMatcher.find()) {
        def version = exactMatcher.group(1)
        return "${version}"
    }

    // Wildcard form like "26.1.x" / "1.21.x" — collapse to "<prefix>+" so the jar name
    // doesn't carry a literal 'x' that downstream tooling could misread as a real version.
    def wildcardPattern = ~/^([0-9.]+)x$/
    def wildcardMatcher = wildcardPattern.matcher(dep)
    if (wildcardMatcher.find()) {
        def prefix = wildcardMatcher.group(1).replaceAll(/\.$/, '')
        return "${prefix}+"
    }

    def rangePattern = ~/>=([0-9.]+)<=([0-9.]+)/
    def rangeMatcher = rangePattern.matcher(dep)
    if (rangeMatcher.find()) {
        def minVersion = rangeMatcher.group(1)
        def maxVersion = rangeMatcher.group(2)
        return "${minVersion}-${maxVersion}"
    }

    def minPattern = ~/>=([0-9.]+)/
    def minMatcher = minPattern.matcher(dep)
    if (minMatcher.find()) {
        def version = minMatcher.group(1)
        return "${version}+"
    }

    def tildePattern = ~/~([0-9.]+)/
    def tildeMatcher = tildePattern.matcher(dep)
    if (tildeMatcher.find()) {
        def version = tildeMatcher.group(1)
        return "${version}"
    }

    return dependency
}
